    <style>
        :root { --primary: #0a55d7; --accent: #d74d0a; --bg: #ffffff; --border: #e0e0e0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        .top-bar { width: 100%; max-width: 950px; display: flex; justify-content: space-between; margin-bottom: 15px; align-items: center; }
        .app-container { width: 100%; max-width: 950px; background: white; padding: 20px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.08); box-sizing: border-box; }
        input { width: 100%; padding: 18px; border-radius: 12px; border: 2px solid var(--border); font-size: 1.2rem; outline: none; box-sizing: border-box; }

        /* Search Results */
        .results-list { margin-top: 15px; max-height: 500px; overflow-y: auto; display: none; border-radius: 12px; border: 1px solid #eee; }
        .result-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; align-items: center; gap: 20px; transition: 0.2s; }
        .result-item:hover { background: #fcfcfc; }
        .result-item.selected { background: #eef4ff; border-left: 6px solid var(--primary); }

        .category-path { font-size: 0.75rem; color: var(--accent); font-weight: bold; text-transform: uppercase; margin-bottom: 4px; display: block; }

        /* Image Styling with Zoom Cursor */
        .img-wrapper { width: 100px; height: 100px; flex-shrink: 0; background: #fff; border: 1px solid #eee; border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: zoom-in; }
        .product-img { width: 100%; height: 100%; object-fit: contain; }

        .item-info { flex: 1; }
        .item-name { font-weight: bold; font-size: 1.1rem; color: #333; display: block; margin-bottom: 5px; line-height: 1.2; }
        .item-meta { color: #888; font-size: 0.85rem; }

        /* Location Badge */
        .loc-badge-container { display: flex; flex-direction: column; min-width: 140px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); text-align: center; }
        .row-tag { background: var(--primary); color: white; padding: 6px; font-weight: bold; font-size: 1rem; }
        .side-tag { padding: 5px; font-size: 0.8rem; font-weight: 800; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        .side-links { background: #e3f2fd; color: #1976d2; }
        .side-rechts { background: #fff3e0; color: #e65100; }
        .sec-tag { background: #f8f9fa; color: #555; padding: 4px; font-weight: bold; font-size: 0.75rem; }

        /* Map UI */
        .map-wrapper { margin-top: 40px; width: 100%; max-width: 950px; overflow-x: auto; padding: 80px 20px 60px; position: relative; scroll-behavior: smooth; }
        .store-layout { position: relative; min-width: 1500px; height: 100px; background: #fafafa; border: 3px solid #444; display: grid; grid-template-columns: repeat(17, 1fr); gap: 10px; padding: 30px 15px; }
        .shelf { background: #e0e0e0; border: 1px solid #bbb; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #888; border-radius: 6px; position: relative; transition: 0.3s; }
        .shelf.active-focus { background: var(--primary) !important; color: white !important; transform: scaleY(1.35); z-index: 10; box-shadow: 0 0 20px rgba(10,85,215,0.4); }

        .user-marker { position: absolute; bottom: -55px; left: 50%; transform: translateX(-50%); text-align: center; color: var(--primary); font-weight: bold; font-size: 0.7rem; }
        .user-dot { width: 18px; height: 18px; background: var(--primary); border-radius: 50%; margin: 0 auto 6px; border: 3px solid white; }
        #walkArrow { position: absolute; top: -55px; left: 50%; transform: translateX(-50%); font-size: 2.5rem; color: var(--primary); display: none; }

        /* Zoom Modal Overlay */
        .zoom-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 9999; cursor: zoom-out; }
        .zoom-content { background: white; padding: 20px; border-radius: 15px; max-width: 80%; max-height: 80%; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .zoom-content img { max-width: 100%; max-height: 70vh; object-fit: contain; display: block; }
        .zoom-caption { text-align: center; margin-top: 15px; font-weight: bold; color: #333; font-size: 1.2rem; }
    </style>
</head>
<body onload="initApp()">

    const USER_POS = 8;

    function initApp() {
        const grid = document.getElementById('mapGrid');
        for (let i = 1; i <= 17; i++) {
            let userHtml = (i === USER_POS) ? `<div class="user-marker"><div id="walkArrow">➔</div><div class="user-dot"></div>HIER</div>` : '';
            grid.innerHTML += `<div class="shelf" id="row-${i}">R${i}${userHtml}</div>`;
        }
    }

    function doSearch() {
        const query = document.getElementById('searchBox').value.toLowerCase();
        const listDiv = document.getElementById('resultsList');

        document.querySelectorAll('.shelf').forEach(s => s.classList.remove('active-focus'));
        const arrow = document.getElementById('walkArrow');
        if(arrow) arrow.style.display = 'none';

        if (query.length < 2) { listDiv.style.display = "none"; return; }

        const matches = inventory.filter(i => 
            i["Artikel omsch."].toLowerCase().includes(query) || 
            i["ArtikelNr."].includes(query) ||
            (i["Hoofdgroep"] && i["Hoofdgroep"].toLowerCase().includes(query)) ||
            (i["Subgroep"] && i["Subgroep"].toLowerCase().includes(query))
        );

        if (matches.length > 0) {
            listDiv.style.display = "block";
            listDiv.innerHTML = matches.map(item => {
                const padMatch = item["Locatie2"].match(/Pad (\d+)/);
                const pad = padMatch ? parseInt(padMatch[1]) : 0;
                const secMatch = item["Locatie2"].match(/Sectie (\d+)/);
                const sec = secMatch ? secMatch[1] : "01";
                
                const isLinks = item["Locatie2"].toLowerCase().includes("links");
                const sideLabel = isLinks ? 'Links' : 'Rechts';
                const sideClass = isLinks ? 'side-links' : 'side-rechts';

                const scene7Url = `https://bouwmaat.scene7.com/is/image/Bouwmaat/${item["ArtikelNr."]}?wid=300&hei=300&fmt=png-alpha`;
                // High res version for zoom
                const zoomUrl = `https://bouwmaat.scene7.com/is/image/Bouwmaat/${item["ArtikelNr."]}?wid=800&hei=800&fmt=png-alpha`;

                return `
                <div class="result-item" onclick="focusRow(${pad}, this)">
                    <div class="img-wrapper" onclick="openZoom('${zoomUrl}', '${item["Artikel omsch."]}')">
                        <img src="${scene7Url}" 
                             class="product-img" 
                             loading="lazy" 
                             referrerpolicy="no-referrer"
                             onerror="this.src='https://via.placeholder.com/100?text=Geen+Foto'">
                    </div>
                    <div class="item-info">
                        <span class="category-path">${item["Hoofdgroep"] || ''} &rsaquo; ${item["Subgroep"] || ''}</span>
                        <span class="item-name">${item["Artikel omsch."]}</span>
                        <span class="item-meta">Artikelnr: ${item["ArtikelNr."]}</span>
                    </div>
                    <div class="loc-badge-container">
                        <div class="row-tag">PAD ${pad}</div>
                        <div class="side-tag ${sideClass}">${sideLabel}</div>
                        <div class="sec-tag">Sectie ${sec}</div>
                    </div>
                </div>`;
            }).join('');
        }
    }

    function openZoom(url, title) {
        document.getElementById('zoomedImg').src = url;
        document.getElementById('zoomCaption').innerText = title;
        document.getElementById('zoomOverlay').style.display = 'flex';
    }

    function closeZoom() {
        document.getElementById('zoomOverlay').style.display = 'none';
    }

    function focusRow(pad, el) {
        document.querySelectorAll('.result-item').forEach(r => r.classList.remove('selected'));
        document.querySelectorAll('.shelf').forEach(s => s.classList.remove('active-focus'));
        el.classList.add('selected');

        const shelf = document.getElementById(`row-${pad}`);
        if(shelf) {
            shelf.classList.add('active-focus');
            shelf.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }

        const arrow = document.getElementById('walkArrow');
        if(arrow) {
            arrow.style.display = 'block';
            arrow.innerText = pad < USER_POS ? '⬅' : (pad > USER_POS ? '➔' : '⬇');
        }
    }

    function resetApp() { 
        document.getElementById('searchBox').value = ''; 
        doSearch(); 
    }
