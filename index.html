
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <title>Bouwmaat Navigator - Character Follow</title>
    <style>
        :root {
            --primary: #0a55d7;
            --bg: #f1f5f9;
            --accent: #ffcc00;
            --floor-white: #ffffff;
            --aisle-bright-blue: #007bff;
            --aisle-highlight: #00e5ff;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; box-sizing: border-box; background: var(--bg); }

        .top-bar { width: 100%; max-width: 950px; display: flex; justify-content: space-between; margin-bottom: 8px; align-items: center; }
        .logo { font-weight: 900; font-size: 1.1rem; color: var(--primary); }

        .app-container { width: 100%; max-width: 950px; flex: 1; display: flex; flex-direction: column; min-height: 0; }

        .search-wrap { margin-bottom: 10px; }
        input {
            width: 100%; padding: 16px 20px; border-radius: 12px; border: 2px solid #fff;
            background: #fff; font-size: 1.3rem; color: var(--primary); outline: none;
            box-sizing: border-box; font-weight: 700; box-shadow: 0 4px 15px rgba(10,85,215,0.1);
        }

        .categories-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 5px; overflow-y: auto; flex: 1; }
        .cat-card { background: white; border-radius: 12px; padding: 12px 8px; text-align: center; box-shadow: 0 2px 6px rgba(0,0,0,0.05); cursor: pointer; transition: 0.2s; border: 2px solid transparent; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .cat-card:hover { border-color: var(--primary); transform: translateY(-2px); }
        .cat-icon { font-size: 1.4rem; margin-bottom: 4px; }
        .cat-name { font-weight: 800; color: var(--primary); font-size: 0.65rem; text-transform: uppercase; line-height: 1.1; }

        .results-list { flex: 1; display: none; flex-direction: column; gap: 8px; overflow-y: auto; }
        .searching .categories-grid { display: none; }
        .searching .results-list { display: flex; }

        .result-item { height: 105px; border-radius: 16px; cursor: pointer; display: flex; align-items: center; background: white; border: 1px solid #e2e8f0; transition: 0.2s; flex-shrink: 0; overflow: hidden; }
        .result-item.selected { border: 3px solid var(--primary); background: #f0f6ff; }

        /* IMAGE ZOOM STYLES */
        .img-wrapper {
            width: 95px;
            height: 95px;
            padding: 8px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden; /* Clips the zoom */
            position: relative;
        }
        .product-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.3s ease; /* Smooth zoom transition */
        }
        /* Zoom effect on hover */
        .result-item:hover .product-img {
            transform: scale(1.6);
        }

        .item-info { flex: 1; padding: 0 15px; overflow: hidden; }
        .item-name { font-weight: 800; font-size: 0.95rem; color: #1e293b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-meta { font-size: 0.75rem; color: #64748b; margin-top: 4px; display: flex; gap: 10px; }
        .meta-tag { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-weight: 700; color: var(--primary); font-size: 0.65rem; }

        .loc-badge { width: 140px; height: 100%; background: var(--primary); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .loc-badge .pad-label { font-size: 1.2rem; font-weight: 900; line-height: 1; }
        .loc-badge .side-label { font-size: 0.7rem; font-weight: 700; color: var(--accent); text-transform: uppercase; margin-top: 2px; }
        .loc-badge .sectie-label { font-size: 0.6rem; opacity: 0.8; margin-top: 5px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 3px; width: 80%; }

        /* MAP SECTION */
        .map-section { width: 100%; max-width: 950px; height: 180px; perspective: 800px; position: relative; flex-shrink: 0; margin-top: 5px; }
        .floor {
            width: 100%; height: 100%; background: var(--floor-white);
            transform: rotateX(40deg); transform-origin: bottom center;
            display: grid; grid-template-columns: repeat(17, 1fr); gap: 8px;
            padding: 10px 20px 50px 20px; box-sizing: border-box;
            border: 2px solid #cbd5e1; border-bottom: 12px solid var(--primary); border-radius: 15px;
            position: relative;
        }

        #pathLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 20; }
        .walking-line { fill: none; stroke: var(--accent); stroke-width: 6; stroke-linecap: round; stroke-dasharray: 1000; stroke-dashoffset: 1000; transition: stroke-dashoffset 0.8s linear; }

        .aisle { background: var(--aisle-bright-blue); border-radius: 4px; display: flex; justify-content: center; position: relative; transition: 0.4s; z-index: 2; border: 1px solid rgba(255,255,255,0.2); }
        .aisle.active { background: var(--aisle-highlight); box-shadow: 0 0 20px var(--aisle-highlight); border-color: #fff; }

        .floor-num { position: absolute; bottom: -38px; font-weight: 900; font-size: 1.1rem; color: #475569; transform: rotateX(-40deg); z-index: 10; }

        .user {
            position: absolute; z-index: 100;
            transition: left 0.4s linear, bottom 0.4s linear, transform 0.4s ease;
            pointer-events: none; display: flex; flex-direction: column; align-items: center; width: 45px;
        }
        #shirt { fill: var(--primary); transition: fill 0.3s; }
        .on-blue #shirt { fill: #ffffff; }

        .bubble { background: var(--accent); color: #000; padding: 4px 10px; border-radius: 8px; font-size: 0.55rem; font-weight: 900; border: 2px solid #fff; margin-bottom: -4px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); white-space: nowrap; text-align: center; }
        .bubble span { display: block; font-size: 0.45rem; opacity: 0.8; }
    </style>
</head>
<body onload="initApp()">

    <div class="top-bar">
        <div class="logo">BOUWMAAT <span>NAVIGATOR</span></div>
        <button onclick="resetApp()" style="background:#fff; border:1px solid #e2e8f0; padding:8px 16px; border-radius:8px; font-weight:800; color:var(--primary); cursor:pointer;">RESET</button>
    </div>

    <div class="app-container" id="mainApp">
        <div class="search-wrap">
            <input type="text" id="searchBox" placeholder="Zoek op naam, nummer of categorie..." oninput="doSearch()" autocomplete="off">
        </div>

        <div id="catGrid" class="categories-grid">
            <div class="cat-card" onclick="setSearch('Hout')"><span class="cat-icon">🪵</span><span class="cat-name">Hout</span></div>
            <div class="cat-card" onclick="setSearch('Gereedschap')"><span class="cat-icon">🔨</span><span class="cat-name">Gereedschap</span></div>
            <div class="cat-card" onclick="setSearch('Bevestigingsmateriaal')"><span class="cat-icon">🔩</span><span class="cat-name">Bevestiging</span></div>
            <div class="cat-card" onclick="setSearch('Elektra')"><span class="cat-icon">🔌</span><span class="cat-name">Elektra</span></div>
            <div class="cat-card" onclick="setSearch('Sanitair')"><span class="cat-icon">🚿</span><span class="cat-name">Sanitair</span></div>
            <div class="cat-card" onclick="setSearch('Verf')"><span class="cat-icon">🎨</span><span class="cat-name">Verf</span></div>
        </div>

        <div id="resultsList" class="results-list"></div>
    </div>

    <div class="map-section">
        <div class="floor" id="mapGrid">
            <svg id="pathLayer"><path id="guideLine" class="walking-line" d="" /></svg>
        </div>
        <div class="user" id="mainChar">
            <div id="userBubble" class="bubble">HIER</div>
            <svg viewBox="0 0 64 100" style="width:100%">
                <circle cx="32" cy="18" r="9" fill="#e0ac69" />
                <path d="M22 18C22 10 27.5 4 32 4 36.5 4 42 10 42 18V22H22V18Z" fill="#5c3c1e"/>
                <rect id="shirt" x="20" y="26" width="24" height="40" rx="4" />
                <rect x="22" y="66" width="10" height="22" fill="#222"/>
                <rect x="32" y="66" width="10" height="22" fill="#222"/>
            </svg>
        </div>
    </div>

<script>
    const data = [
      {
      "ArtikelNr.": "032711",
      "Artikel omsch.": "fischer Nagelplug N 6x40mm 50st",
      "Schaplocatie code": "06R-002-0090",
      "Hoofdgroep": "Bevestigingsmateriaal",
      "Subgroep": "Pluggen",
      "Locatie2": "Pad 06 Rechts, Sectie 02"
      },
      {
      "ArtikelNr.": "032738",
      "Artikel omsch.": "fischer Nagelplug N 8x100mm 50st",
      "Schaplocatie code": "06R-002-0150",
      "Hoofdgroep": "Bevestigingsmateriaal",
      "Subgroep": "Pluggen",
      "Locatie2": "Pad 06 Rechts, Sectie 02"
      },
      {
      "ArtikelNr.": "032754",
      "Artikel omsch.": "fischer Nagelplug N 8x120mm 50st",
      "Schaplocatie code": "06R-002-0160",
      "Hoofdgroep": "Bevestigingsmateriaal",
      "Subgroep": "Pluggen",
      "Locatie2": "Pad 06 Rechts, Sectie 02"
      }
    ];

    function initApp() {
        const grid = document.getElementById('mapGrid');
        const svg = document.getElementById('pathLayer');
        grid.innerHTML = ''; grid.appendChild(svg);
        for (let i = 1; i <= 17; i++) {
            grid.innerHTML += `<div class="aisle" id="p-${i}"><div class="floor-num">${i}</div></div>`;
        }
        setTimeout(() => moveChar(8, false, ""), 100);
    }

    function moveChar(pad, isBlue, detailText) {
        const startPad = 8;
        const svg = document.getElementById('pathLayer'), line = document.getElementById('guideLine');
        const startEl = document.getElementById(`p-${startPad}`), endEl = document.getElementById(`p-${pad}`);
        const char = document.getElementById('mainChar');
        const bubble = document.getElementById('userBubble');

        const x1 = startEl.offsetLeft + (startEl.offsetWidth / 2);
        const yBase = svg.clientHeight - 10;
        const x2 = endEl.offsetLeft + (endEl.offsetWidth / 2);
        const y2 = isBlue ? 50 : yBase;

        line.setAttribute('d', `M ${x1} ${yBase} L ${x2} ${yBase} L ${x2} ${y2}`);
        const len = line.getTotalLength();
        line.style.transition = 'none'; line.style.strokeDasharray = len; line.style.strokeDashoffset = len;
        setTimeout(() => {
            line.style.transition = 'stroke-dashoffset 0.8s linear';
            line.style.strokeDashoffset = '0';
        }, 10);

        char.style.left = `${x2}px`;
        char.style.bottom = `15px`;
        char.style.transform = `scale(1) translateX(-50%)`;
        char.classList.remove('on-blue');
        bubble.innerHTML = isBlue ? "..." : "HIER";

        if (isBlue) {
            setTimeout(() => {
                char.style.bottom = `90px`;
                char.style.transform = `scale(0.6) translateX(-50%)`;
                char.classList.add('on-blue');
                bubble.innerHTML = detailText;
            }, 400);
        }
    }

    function doSearch() {
        const q = document.getElementById('searchBox').value.toLowerCase();
        const list = document.getElementById('resultsList'), app = document.getElementById('mainApp');
        if (q.length < 1) { app.classList.remove('searching'); return; }
        app.classList.add('searching');

        const results = data.filter(item => Object.values(item).some(val => String(val).toLowerCase().includes(q)));

        list.innerHTML = results.map(item => {
            const padNum = item.Locatie2.match(/\d+/)[0];
            const side = item.Locatie2.includes("Rechts") ? "Rechts" : "Links";
            const section = item.Locatie2.split("Sectie")[1]?.trim() || "01";
            const detailText = `SECTIE ${section}<span>${side}</span>`;

            // Build image URL and fallback
            const productID = item["ArtikelNr."];
            const primaryImg = `https://cdn.bouwmaat.nl/api/media/aspos/Product/Front/${productID}.webp`;
            const fallbackImg = `https://bouwmaat.scene7.com/is/image/Bouwmaat/${productID}?wid=200&fmt=webp`;

            return `<div class="result-item" onclick="selectResult(${parseInt(padNum)}, '${detailText}', this)">
                <div class="img-wrapper">
                    <img src="${primaryImg}"
                         onerror="this.src='${fallbackImg}'"
                         class="product-img">
                </div>
                <div class="item-info">
                    <div class="item-name">${item["Artikel omsch."]}</div>
                    <div class="item-meta">
                        <span class="meta-tag">Art: ${item["ArtikelNr."]}</span>
                        <span class="meta-tag">${item.Hoofdgroep}</span>
                    </div>
                </div>
                <div class="loc-badge">
                    <div class="pad-label">PAD ${padNum}</div>
                    <div class="side-label">${side}</div>
                    <div class="sectie-label">Sectie ${section}</div>
                </div>
            </div>`;
        }).join('');
    }

    function selectResult(pad, detail, el) {
        document.querySelectorAll('.aisle').forEach(a => a.classList.remove('active'));
        document.querySelectorAll('.result-item').forEach(r => r.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById(`p-${pad}`).classList.add('active');
        moveChar(pad, true, detail);
    }

    function setSearch(cat) { document.getElementById('searchBox').value = cat; doSearch(); }
    function resetApp() {
        document.getElementById('searchBox').value = '';
        document.getElementById('mainApp').classList.remove('searching');
        document.querySelectorAll('.aisle').forEach(a => a.classList.remove('active'));
        document.getElementById('guideLine').setAttribute('d', '');
        moveChar(8, false, "HIER");
    }
</script>
</body>
</html>
